<style>

.gallery-section{
padding:60px 20px;
text-align:center;
}

.gallery-section h1{
font-size:40px;
color:#ff4da6;
margin-bottom:10px;
}

.gallery-section p{
margin-bottom:40px;
font-size:18px;
}

.gallery-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.gallery-card{
position:relative;
overflow:hidden;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.gallery-card img{
width:100%;
height:250px;
object-fit:cover;
transition:0.4s;
}

.gallery-card:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
transition:0.4s;
}

.gallery-card:hover .overlay{
opacity:1;
}

.overlay i{
color:white;
font-size:35px;
}

.icon-top{
font-size:30px;
color:#ff4da6;
margin-bottom:10px;
}

</style>

</head>
