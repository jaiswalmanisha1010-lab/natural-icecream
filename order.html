<!DOCTYPE html>
<html>

<head>
<title>Order Ice Cream</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1 style="text-align:center;margin-top:40px;">Order Ice Cream</h1>

<form style="max-width:500px;margin:auto;margin-top:40px;">

<input type="text" placeholder="Your Name" required style="width:100%;padding:10px;margin:10px 0;">

<input type="tel" placeholder="Phone Number" required style="width:100%;padding:10px;margin:10px 0;">

<select style="width:100%;padding:10px;margin:10px 0;">

<option>Chocolate</option>
<option>Vanilla</option>
<option>Strawberry</option>
<option>Pista</option>
<option>Banana</option>

</select>

<button style="padding:12px 20px;background:#ff4da6;color:white;border:none;border-radius:10px;">
Place Order
</button>

</form>

</body>
</html>
